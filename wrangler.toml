name = "luna-ai-bot"
main = "index.ts"  # ← اینجا را تغییر دهید
compatibility_date = "2024-12-18"
# ... باقی تنظیمات

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "SESSIONS"
id = "33277d761c894912a0e554e2b8b2a9a4"

[vars]
ADMIN_ID = "5989309344"
MAINTENANCE_MODE = "false"
WEBHOOK_URL = "https://luna-ai-bot.workers.dev/webhook"

[env.production.vars]
ENVIRONMENT = "production"
ADMIN_ID = "5989309344"
MAINTENANCE_MODE = "false"
WEBHOOK_URL = "https://luna-ai-bot.workers.dev/webhook"
