name = "luna-ai-bot"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "SESSIONS"
id = "33277d761c894912a0e554e2b8b2a9a4"

[vars]
MAINTENANCE_MODE = "false"
WEBHOOK_URL = "REAL_WEBHOOK_URL"

[env.production.vars]
ENVIRONMENT = "production"
MAINTENANCE_MODE = "false"
WEBHOOK_URL = "REAL_WEBHOOK_URL"
